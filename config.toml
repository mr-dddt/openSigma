[capital]
initial_usd = 50.0
max_trade_pct = 35.0
# Aggressive preset: STRONG signal can deploy more capital
strong_signal_size_mult = 1.8
max_concurrent_positions = 10
max_daily_loss_pct = 10.0
kill_switch_drawdown_pct = 20.0

[hyperliquid]
max_leverage = 50

[execution]
max_trade_duration_secs = 1800
max_second_looks = 3
signal_eval_interval_secs = 5
enable_proactive_exit = true
# Aggressive 15s-edge profile:
# - harvest small early edge quickly
# - protect winners from round-trip
# - cut stale trades sooner
# - keep logs/LLM heartbeat active in slow regimes
fast_take_window_secs = 18
fast_take_trigger_pct = 0.06
profit_lock_trigger_pct = 0.08
profit_lock_floor_pct = 0.015
peak_giveback_ratio = 0.35
stale_after_secs = 20
stale_min_pnl_pct = 0.03
idle_llm_ping_secs = 45
fee_bps_per_side = 3.5
sell_trigger_extra_buffer_pct = 0.02

[sessions.ny_kill_zone]
start = "13:30"
end = "16:00"
size_mult = 1.0

[sessions.london_open]
start = "07:00"
end = "09:30"
size_mult = 0.4

[sessions.late_ny]
start = "20:00"
end = "22:00"
size_mult = 0.6

[llm]
model = "claude-sonnet-4-20250514"
timeout_ms = 8000

[signals]
strong_threshold = 4
lean_threshold = 2
min_atr_pct = 0.035
max_funding_same_dir = 0.06
# Tunable indicator weights (LLM can adjust at runtime)
ema_cross_weight = 2
cvd_weight = 3
rsi_weight = 1
ob_weight = 2
stoch_rsi_weight = 1
rsi_oversold = 40.0
rsi_overbought = 60.0
funding_score_threshold = 0.002
funding_weight = 1
cvd_slope_threshold = 15.0
ob_lean_threshold = 1.2
ob_strong_threshold = 1.7
regime_trend_spread_pct = 0.03
vwap_dev_reversion_pct = 0.30
vwap_weight = 1
delta_div_lookback_bars = 12
delta_div_weight = 2
oi_weight = 1
oi_delta_min_pct = 0.03

[tuning]
tune_every_n_trades = 5
inactivity_timeout_secs = 600

[telegram]
enabled = true
# Set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in .env
